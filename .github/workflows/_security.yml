---
name: Security Scans

on:
  workflow_call:

permissions: {}

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Setup
        uses: avishj/blueprints/.github/actions/setup@19bdb966ebc356d5b517946bc707c4d9e07f8361  # main
        with:
          fetch-depth: 0
          uv: "false"
          just: "false"
          bun: "false"

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}

  zizmor:
    name: Workflow Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write  # upload SARIF to Code Scanning
    steps:
      - name: Setup
        uses: avishj/blueprints/.github/actions/setup@19bdb966ebc356d5b517946bc707c4d9e07f8361  # main
        with:
          uv: "false"
          just: "false"
          bun: "false"

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          persona: pedantic
          online-audits: true
          min-severity: informational
          min-confidence: low
          version: v1.23.1
          token: ${{ github.token }}
          advanced-security: true
