---
name: Verify Stack

on:
  workflow_call:
    inputs:
      stack:
        description: 'Name of the stack to verify (e.g. python-cli)'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout and verify'
        type: string
        required: true

jobs: {}
