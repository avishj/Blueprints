---
name: Verify Stack

on:
  workflow_call:
    inputs:
      stack:
        description: 'Name of the stack to verify (e.g. python-cli)'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout and verify'
        type: string
        required: true
    secrets:
      SMOKE_TOKEN:
        description: 'PAT with Contents/PRs R/W on the smoke repo'
        required: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install just
        run: uv tool install rust-just==1.50.0

      - name: Regen template
        env:
          STACK: ${{ inputs.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            /tmp/out

      - name: Run preflight commands
        working-directory: /tmp/out
        run: |
          git init --quiet
          git switch -c verify/preflight
          just install
          just lint
          just build

  smoke:
    name: Smoke
    needs: preflight
    # Skip on fork PRs: SMOKE_TOKEN is unavailable to forked workflows.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: smoke  # scopes SMOKE_TOKEN to this job; gate via env protection rules
    permissions:
      pull-requests: write  # rolling smoke summary on the Blueprints PR
    concurrency:
      group: smoke-${{ inputs.stack }}
      cancel-in-progress: false
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Regen template
        env:
          STACK: ${{ inputs.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            /tmp/out

      - name: Force-push regen to smoke main
        id: push
        working-directory: /tmp/out
        env:
          STACK: ${{ inputs.stack }}
          REF: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: |
          gh auth setup-git
          git init --quiet
          git config user.name "blueprints-verify[bot]"
          git config user.email "blueprints-verify@users.noreply.github.com"
          git add -A
          git commit --quiet -m "smoke: regen from $REF"
          git remote add origin "https://github.com/avishj/blueprints-smoke-$STACK.git"
          git push --force --quiet origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for smoke push CI
        id: push-ci
        env:
          STACK: ${{ inputs.stack }}
          SHA: ${{ steps.push.outputs.sha }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: python .github/scripts/smoke.py wait --kind push --stack "$STACK" --sha "$SHA"

      - name: Open verify PR on smoke repo
        id: pr
        env:
          STACK: ${{ inputs.stack }}
          RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: python .github/scripts/smoke.py open-pr --stack "$STACK" --run-id "$RUN_ID"

      - name: Wait for smoke PR CI
        id: pr-ci
        env:
          STACK: ${{ inputs.stack }}
          SHA: ${{ steps.pr.outputs.sha }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: python .github/scripts/smoke.py wait --kind pr --stack "$STACK" --sha "$SHA"

      - name: Cleanup verify PR and branch
        if: always() && steps.pr.outputs.branch != ''
        env:
          STACK: ${{ inputs.stack }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: >-
          python .github/scripts/smoke.py cleanup
          --stack "$STACK" --pr-number "$PR_NUMBER" --branch "$BRANCH"

      - name: Post smoke summary on Blueprints PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          STACK: ${{ inputs.stack }}
          REF: ${{ inputs.ref }}
          PUSH_OUTCOME: ${{ steps.push-ci.outcome }}
          PR_OUTCOME: ${{ steps.pr-ci.outcome }}
          SMOKE_PR_URL: ${{ steps.pr.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BP_PR: ${{ github.event.pull_request.number }}
        run: >-
          python .github/scripts/smoke.py comment
          --stack "$STACK" --ref "$REF"
          --push-outcome "$PUSH_OUTCOME" --pr-outcome "$PR_OUTCOME"
          --smoke-pr-url "$SMOKE_PR_URL" --run-url "$RUN_URL"
          --blueprints-pr "$BP_PR"
