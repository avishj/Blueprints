---
name: Verify Stack

on:
  workflow_call:
    inputs:
      stack:
        description: 'Name of the stack to verify (e.g. python-cli)'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout and verify'
        type: string
        required: true
    secrets:
      SMOKE_TOKEN:
        description: 'PAT with Contents/PRs R/W on the smoke repo'
        required: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install just
        run: uv tool install rust-just==1.50.0

      - name: Regen template
        env:
          STACK: ${{ inputs.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            /tmp/out

      - name: Run preflight commands
        working-directory: /tmp/out
        run: |
          git init --quiet
          git switch -c verify/preflight
          just install
          just lint
          just build

  smoke:
    name: Smoke
    needs: preflight
    # Skip on fork PRs: SMOKE_TOKEN is unavailable to forked workflows.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: smoke  # scopes SMOKE_TOKEN to this job; gate via env protection rules
    permissions:
      pull-requests: write  # rolling smoke summary on the Blueprints PR
    concurrency:
      group: smoke-${{ inputs.stack }}
      cancel-in-progress: false
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Regen template
        env:
          STACK: ${{ inputs.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            /tmp/out

      - name: Force-push regen to smoke main
        id: push
        working-directory: /tmp/out
        env:
          STACK: ${{ inputs.stack }}
          REF: ${{ inputs.ref }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: |
          gh auth setup-git
          git init --quiet
          git config user.name "blueprints-verify[bot]"
          git config user.email "blueprints-verify@users.noreply.github.com"
          git add -A
          git commit --quiet -m "smoke: regen from $REF"
          git remote add origin "https://github.com/avishj/blueprints-smoke-$STACK.git"
          git push --force --quiet origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for smoke push CI
        id: push-ci
        env:
          STACK: ${{ inputs.stack }}
          SHA: ${{ steps.push.outputs.sha }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: python .github/scripts/smoke.py wait --kind push --stack "$STACK" --sha "$SHA"

      - name: Open verify PR on smoke repo
        id: pr
        env:
          STACK: ${{ inputs.stack }}
          RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: |
          repo="avishj/blueprints-smoke-$STACK"
          branch="verify/$RUN_ID"
          trigger="$GITHUB_WORKSPACE/stacks/$STACK/verify/trigger.py"

          gh repo clone "$repo" /tmp/smoke-clone -- --depth 1
          cd /tmp/smoke-clone
          git config user.name "blueprints-verify[bot]"
          git config user.email "blueprints-verify@users.noreply.github.com"
          git switch -c "$branch"
          "$trigger"
          git add -A
          git commit --quiet -m "verify: trigger run $RUN_ID"
          git push --quiet --set-upstream origin "$branch"

          pr_url=$(gh pr create \
            --repo "$repo" \
            --base main \
            --head "$branch" \
            --title "verify: $RUN_ID" \
            --body "Automated verify PR from Blueprints run $RUN_ID." \
            --label verify)
          pr_number="${pr_url##*/}"
          sha=$(git rev-parse HEAD)
          {
            echo "number=$pr_number"
            echo "branch=$branch"
            echo "url=$pr_url"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for smoke PR CI
        id: pr-ci
        env:
          STACK: ${{ inputs.stack }}
          SHA: ${{ steps.pr.outputs.sha }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: python .github/scripts/smoke.py wait --kind pr --stack "$STACK" --sha "$SHA"

      - name: Cleanup verify PR and branch
        if: always() && steps.pr.outputs.branch != ''
        env:
          STACK: ${{ inputs.stack }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          GH_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: |
          repo="avishj/blueprints-smoke-$STACK"
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr close "$PR_NUMBER" --repo "$repo" --delete-branch || true
          else
            gh api -X DELETE "repos/$repo/git/refs/heads/$BRANCH" || true
          fi

      - name: Render smoke comment body
        if: always() && github.event_name == 'pull_request'
        env:
          STACK: ${{ inputs.stack }}
          REF: ${{ inputs.ref }}
          PUSH_CI: ${{ steps.push-ci.outcome }}
          PR_CI: ${{ steps.pr-ci.outcome }}
          PR_URL: ${{ steps.pr.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          icon() { [[ "$1" == "success" ]] && echo "✅" || echo "❌"; }
          {
            echo "<!-- blueprints-smoke-$STACK -->"
            echo "### Smoke: \`$STACK\`"
            echo
            echo "- $(icon "$PUSH_CI") push CI"
            echo "- $(icon "$PR_CI") PR CI"
            echo
            echo "Verify run: $RUN_URL"
            echo "Smoke PR: ${PR_URL:-_not opened_}"
            echo "Ref: \`$REF\`"
          } > /tmp/smoke-comment.md

      - name: Post smoke comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          MARKER: <!-- blueprints-smoke-${{ inputs.stack }} -->
        run: |
          existing=$(gh api --paginate "repos/$REPO/issues/$PR/comments" \
            --jq ".[] | select(.user.login==\"github-actions[bot]\" and (.body | contains(\"$MARKER\"))) | .id" \
            | head -n1)
          if [[ -n "$existing" ]]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -F body=@/tmp/smoke-comment.md
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -F body=@/tmp/smoke-comment.md
          fi
