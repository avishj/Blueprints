---
name: Verify Stack

on:
  workflow_call:
    inputs:
      stack:
        description: 'Name of the stack to verify (e.g. python-cli)'
        type: string
        required: true
      ref:
        description: 'Git ref to checkout and verify'
        type: string
        required: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install just
        run: uv tool install rust-just==1.50.0

      - name: Regen template
        env:
          STACK: ${{ inputs.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            /tmp/out

      - name: Run preflight commands
        working-directory: /tmp/out
        run: |
          git init --quiet
          git switch -c verify/preflight
          just install
          just lint
          just build

  smoke:
    name: Smoke
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    concurrency:
      group: smoke-${{ inputs.stack }}
      cancel-in-progress: false
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Regen template
        env:
          STACK: ${{ inputs.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            /tmp/out

      - name: Force-push regen to smoke main
        id: push
        working-directory: /tmp/out
        env:
          STACK: ${{ inputs.stack }}
          REF: ${{ inputs.ref }}
          SMOKE_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: |
          git init --quiet
          git config user.name "blueprints-verify[bot]"
          git config user.email "blueprints-verify@users.noreply.github.com"
          git add -A
          git commit --quiet -m "smoke: regen from $REF"
          git remote add origin "https://x-access-token:$SMOKE_TOKEN@github.com/avishj/blueprints-smoke-$STACK.git"
          git push --force --quiet origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
