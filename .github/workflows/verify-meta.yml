---
name: Verify Meta

on:
  workflow_call:

permissions: {}

jobs:
  meta-security:
    name: Meta Security
    uses: ./.github/workflows/_security.yml
    permissions:
      security-events: write  # passed to _security.yml for SARIF upload

  meta-lint:
    name: Meta Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Spell check
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83  # v1.45.1

      - name: Check links
        if: '!cancelled()'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: --exclude-path 'stacks/[^/]+/template' '**/*.md'
          fail: true
          jobSummary: true

      - name: Validate stack structure
        if: '!cancelled()'
        run: |
          failed=0
          for stack in stacks/*/; do
            name=$(basename "$stack")
            for required in copier.yml README.md VERIFICATION.md template; do
              if [ ! -e "$stack$required" ]; then
                echo "::error::stacks/$name is missing $required"
                failed=1
              fi
            done
          done
          exit $failed

      - name: Validate schemas
        if: '!cancelled()'
        run: |
          uvx check-jsonschema --builtin-schema vendor.renovate renovate.json
          uvx check-jsonschema --builtin-schema vendor.github-workflows .github/workflows/*.yml
          uvx check-jsonschema --schemafile https://www.schemastore.org/pull-request-labeler.json .github/labeler.yml

      - name: YAML lint
        if: '!cancelled()'
        run: >-
          uvx yamllint
          -d '{extends: default, rules: {line-length: disable, truthy: disable}, ignore: "stacks/*/template/**"}'
          .

      - name: Run actionlint
        if: '!cancelled()'
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          matcher: true
          shellcheck: true
          flags: "-color"

      # TODO: remove once raven-actions/actionlint does auto cleanup
      - name: Clean up actionlint artifacts
        if: '!cancelled()'
        run: rm -rf node_modules package-lock.json

      - name: Lint Markdown
        if: '!cancelled()'
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0

  stack-contract-matrix:
    name: Determine Stacks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      stacks: ${{ steps.discover.outputs.stacks }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Discover stacks
        id: discover
        run: |
          stacks=$(python3 -c "import json,pathlib;print(json.dumps(sorted(p.parent.name for p in pathlib.Path('stacks').glob('*/copier.yml'))))")
          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"

  stack-contract:
    name: Stack Contract (${{ matrix.stack }})
    needs: stack-contract-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.stack-contract-matrix.outputs.stacks) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Validate stack file existence
        shell: python
        run: |
          import os, sys
          stack = "${{ matrix.stack }}"
          required = [
              "copier.yml",
              "template",
              "README.md",
              "VERIFICATION.md",
              "verify/answers.yml",
              "verify/preflight.py",
              "verify/trigger.py",
              "verify/README.md"
          ]
          failed = False
          for req in required:
              path = os.path.join("stacks", stack, req)
              if not os.path.exists(path):
                  print(f"::error::stacks/{stack} is missing {req}")
                  failed = True
          sys.exit(1 if failed else 0)

      - name: Validate verify scripts shebang and mode
        shell: python
        run: |
          import os, sys
          stack = "${{ matrix.stack }}"
          scripts = ["verify/preflight.py", "verify/trigger.py"]
          failed = False
          for script in scripts:
              path = os.path.join("stacks", stack, script)
              if not os.path.exists(path):
                  continue
              if not os.access(path, os.X_OK):
                  print(f"::error::stacks/{stack}/{script} is not executable")
                  failed = True
              with open(path, "r") as f:
                  content = f.read()
              if not content.startswith("#!/usr/bin/env -S uv run --script"):
                  print(f"::error::stacks/{stack}/{script} has incorrect shebang")
                  failed = True
              if "# /// script" not in content:
                  print(f"::error::stacks/{stack}/{script} is missing PEP 723 # /// script block")
                  failed = True
          sys.exit(1 if failed else 0)

      - name: Validate copier.yml structure
        shell: python
        run: |
          import os, sys
          stack = "${{ matrix.stack }}"
          path = os.path.join("stacks", stack, "copier.yml")
          if not os.path.exists(path):
              sys.exit(0)
          with open(path, "r") as f:
              content = f.read()

          failed = False
          if "_subdirectory: template" not in content:
              print(f"::error::stacks/{stack}/copier.yml _subdirectory must be 'template'")
              failed = True

          if "_min_copier_version:" not in content:
              print(f"::error::stacks/{stack}/copier.yml _min_copier_version is missing")
              failed = True

          sys.exit(1 if failed else 0)
