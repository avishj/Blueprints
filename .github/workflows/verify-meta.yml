---
name: Verify Meta

on:
  workflow_call:

permissions: {}

jobs:
  meta-security:
    name: Meta Security
    uses: ./.github/workflows/_security.yml
    permissions:
      security-events: write  # passed to _security.yml for SARIF upload

  meta-lint:
    name: Meta Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Spell check
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83  # v1.45.1

      - name: Check links
        if: '!cancelled()'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: --exclude-path 'stacks/[^/]+/template' '**/*.md'
          fail: true
          jobSummary: true

      - name: Validate schemas
        if: '!cancelled()'
        run: |
          uvx check-jsonschema@0.37.1 --builtin-schema vendor.renovate renovate.json
          uvx check-jsonschema@0.37.1 --builtin-schema vendor.github-workflows .github/workflows/*.yml
          uvx check-jsonschema@0.37.1 --schemafile https://www.schemastore.org/pull-request-labeler.json .github/labeler.yml

      - name: YAML lint
        if: '!cancelled()'
        run: >-
          uvx yamllint@1.38.0
          -d '{extends: default, rules: {line-length: disable, truthy: disable}, ignore: "stacks/*/template/**"}'
          .

      - name: Run actionlint
        if: '!cancelled()'
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          matcher: true
          shellcheck: true
          flags: "-color"

      # TODO: remove once raven-actions/actionlint does auto cleanup
      - name: Clean up actionlint artifacts
        if: '!cancelled()'
        run: rm -rf node_modules package-lock.json

      - name: Lint Markdown
        if: '!cancelled()'
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0

  stack-contract:
    name: Stack Contract (${{ matrix.stack }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        stack: [astro-ts-react, python-cli]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Validate stack contract
        env:
          STACK: ${{ matrix.stack }}
        run: |
          uv run --with pyyaml python <<'PY'
          import os
          import sys
          from pathlib import Path

          import yaml


          stack_dir = Path("stacks") / os.environ["STACK"]
          copier_path = stack_dir / "copier.yml"
          shebang = "#!/usr/bin/env -S uv run --script"
          errors: list[str] = []

          for relative_path in (
              "copier.yml",
              "template",
              "README.md",
              "VERIFICATION.md",
              "verify/answers.yml",
              "verify/trigger.py",
              "verify/README.md",
          ):
              path = stack_dir / relative_path
              if not path.exists():
                  errors.append(f"::error file={path.as_posix()}::missing required file")

          for relative_path in ("verify/trigger.py",):
              path = stack_dir / relative_path
              if not path.exists():
                  continue

              content = path.read_text(encoding="utf-8")
              for message, valid in (
                  ("script must be executable", os.access(path, os.X_OK)),
                  ("script must start with the uv shebang", content.startswith(shebang)),
                  ("script must include a PEP 723 block", "# /// script" in content),
              ):
                  if not valid:
                      errors.append(f"::error file={path.as_posix()}::{message}")

          if copier_path.exists():
              content = copier_path.read_text(encoding="utf-8")
              if "_subdirectory: template" not in content:
                  errors.append(f"::error file={copier_path.as_posix()}::_subdirectory must be 'template'")
              if "_min_copier_version:" not in content:
                  errors.append(f"::error file={copier_path.as_posix()}::_min_copier_version is required")

              data = yaml.safe_load(content) or {}
              if not isinstance(data, dict):
                  errors.append(f"::error file={copier_path.as_posix()}::copier.yml must be a mapping")
              else:
                  for question_name, question in data.items():
                      if question_name.startswith("_") or not isinstance(question, dict):
                          continue
                      for field in ("help", "type"):
                          if field not in question:
                              errors.append(
                                  f"::error file={copier_path.as_posix()}::question '{question_name}' is missing {field}"
                              )

          if errors:
              print("\n".join(errors))
          sys.exit(1 if errors else 0)
          PY

      - name: Validate copier --pretend with stack answers
        env:
          STACK: ${{ matrix.stack }}
        run: |
          uvx copier@9.14.3 copy \
            --defaults \
            --trust \
            --pretend \
            --vcs-ref=HEAD \
            --data-file "stacks/$STACK/verify/answers.yml" \
            "stacks/$STACK" \
            "/tmp/throwaway-$STACK"
