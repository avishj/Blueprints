---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify-meta:
    name: Verify Meta
    uses: ./.github/workflows/verify-meta.yml
    permissions:
      security-events: write  # passed through to _security.yml for SARIF upload

  changes:
    name: Detect Changed Stacks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      stacks: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changed stacks
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            astro-ts-react:
              - 'stacks/astro-ts-react/**'
            python-cli:
              - 'stacks/python-cli/**'

  verify-stack:
    name: Verify Stack
    needs: changes
    if: needs.changes.outputs.stacks != '[]'
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.changes.outputs.stacks) }}
    uses: ./.github/workflows/verify-stack.yml
    with:
      stack: ${{ matrix.stack }}
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
    permissions:
      pull-requests: write  # smoke job posts rolling comment on the PR
    secrets: inherit

  ci-passed:
    name: CI Passed
    if: always()
    needs: [verify-meta, changes, verify-stack]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check results
        env:
          HAS_FAILURE: ${{ contains(needs.*.result, 'failure') }}
          HAS_CANCELLED: ${{ contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$HAS_FAILURE" == "true" || "$HAS_CANCELLED" == "true" ]]; then
            echo "::error::One or more jobs failed or were cancelled."
            exit 1
          fi
