---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify-meta:
    name: Verify Meta
    uses: ./.github/workflows/verify-meta.yml
    permissions:
      security-events: write  # passed through to _security.yml for SARIF upload

  ci-passed:
    name: CI Passed
    if: always()
    needs: [verify-meta]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check results
        env:
          HAS_FAILURE: ${{ contains(needs.*.result, 'failure') }}
          HAS_CANCELLED: ${{ contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$HAS_FAILURE" == "true" || "$HAS_CANCELLED" == "true" ]]; then
            echo "::error::One or more jobs failed or were cancelled."
            exit 1
          fi
