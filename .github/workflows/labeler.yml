---
name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write  # labeler adds/removes labels
    steps:
      - name: Setup
        uses: avishj/blueprints/.github/actions/setup@19bdb966ebc356d5b517946bc707c4d9e07f8361  # main
        with:
          checkout: "false"
          uv: "false"
          just: "false"
          bun: "false"

      - name: Label PR
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213  # v6.1.0
        with:
          sync-labels: true
