---
name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Setup
        uses: avishj/blueprints/.github/actions/setup@main
        with:
          checkout: "false"
          uv: "false"
          just: "false"
          bun: "false"

      - name: Label PR
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b  # v6.0.1
        with:
          sync-labels: true
