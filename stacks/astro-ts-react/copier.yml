---
# --- Copier metadata ---
_subdirectory: template
_templates_suffix: ".jinja"
_min_copier_version: "9.14.1"
_envops:
  trim_blocks: true
  lstrip_blocks: true

# --- Questions ---

project_name:
  type: str
  help: "Project/package name (kebab-case recommended, e.g. my-app)"
  validator: >-
    {% if ' ' in project_name %}project_name cannot contain spaces
    {% elif '"' in project_name or '\\' in project_name %}project_name cannot contain quotes or backslashes
    {% elif '\n' in project_name or '\r' in project_name %}project_name cannot contain newlines
    {% endif %}

owner:
  type: str
  help: "GitHub owner (username or organization, e.g. avishj)"
  validator: "{% if not owner %}owner cannot be empty{% endif %}"

description:
  type: str
  default: "A modern Astro + React application."
  help: "Short one-line project description"
  validator: >-
    {% if '"' in description or '\\' in description %}description cannot contain quotes or backslashes
    {% elif '\n' in description or '\r' in description %}description cannot contain newlines
    {% endif %}

author_name:
  type: str
  default: "Avish J"
  help: "Primary author display name"

author_email:
  type: str
  default: "avish.j@pm.me"
  help: "Primary author email"
  validator: "{% if '@' not in author_email %}author_email must contain '@'{% endif %}"

copyright_year:
  type: str
  default: "2026"
  help: "Copyright year used in notices"
  validator: "{% if not copyright_year.isdigit() %}copyright_year must be numeric{% endif %}"

runtime:
  type: str
  default: "bun"
  when: false
  help: "JS runtime (locked to bun)"
  validator: "{% if runtime != 'bun' %}Runtime is locked to bun{% endif %}"

strict_typescript:
  type: bool
  default: true
  when: false
  help: "Enable TypeScript strict mode (required)"
  validator: "{% if not strict_typescript %}TypeScript strict mode is required{% endif %}"

motion_profile:
  type: str
  default: "balanced"
  choices:
    - "balanced"
    - "minimal"
    - "cinematic"
  help: "Default motion intensity profile for generated presets"
  validator: "{% if motion_profile not in ['balanced', 'minimal', 'cinematic'] %}motion_profile must be balanced|minimal|cinematic{% endif %}"

include_motion_demo:
  type: bool
  default: true
  help: "Include GSAP demo island in the scaffolded landing page"

motion_scroll_reveal:
  type: bool
  default: true
  help: "Enable in-view reveal helper defaults for generated components"

# --- Derived values ---

package_name:
  type: str
  default: "{{ project_name | lower }}"
  when: false
  help: "NPM package name (auto-derived)"
  validator: "{% if not package_name %}package_name cannot be empty{% endif %}"

module_name:
  type: str
  default: "{{ project_name | lower | replace('-', '_') }}"
  when: false
  help: "Derived internal module name"
  validator: "{% if not module_name.isidentifier() %}project_name '{{ project_name }}' must produce a valid module identifier{% endif %}"

env_prefix:
  type: str
  default: "{{ module_name | upper }}_"
  help: "Environment variable prefix (auto-derived, may be overridden)"
  validator: "{% if not env_prefix.endswith('_') %}env_prefix must end with underscore{% endif %}"

# --- Post-scaffold tasks ---

_tasks:
  - "bun install"
