# --- Copier metadata ---
_subdirectory: template
_templates_suffix: ".jinja"
_min_copier_version: "9.14.1"
_envops:
  trim_blocks: true
  lstrip_blocks: true

# --- Questions ---

project_name:
  type: str
  help: "Package/project name (e.g. my-app)"

owner:
  type: str
  help: "GitHub username or org (e.g. avishj)"

description:
  type: str
  default: "A modern Astro + React application."
  help: "Short project description"

author_name:
  type: str
  default: "Avish J"
  help: "Author display name"

author_email:
  type: str
  default: "avish.j@pm.me"
  help: "Author email"

copyright_year:
  type: str
  default: "2026"
  help: "Copyright year"

runtime:
  type: str
  default: "bun"
  when: false
  validator: "{% if runtime != 'bun' %}Runtime is locked to bun{% endif %}"

strict_typescript:
  type: bool
  default: true
  when: false
  validator: "{% if not strict_typescript %}TypeScript strict mode is required{% endif %}"

# --- Derived values ---

package_name:
  type: str
  default: "{{ project_name | lower }}"
  when: false
  validator: "{% if not package_name %}package_name cannot be empty{% endif %}"

module_name:
  type: str
  default: "{{ project_name | lower | replace('-', '_') }}"
  when: false
  validator: "{% if not module_name.isidentifier() %}project_name '{{ project_name }}' must produce a valid module identifier{% endif %}"

env_prefix:
  type: str
  default: "{{ module_name | upper }}_"
  help: "Environment variable prefix (auto-derived)"
  validator: "{% if not env_prefix.endswith('_') %}env_prefix must end with underscore{% endif %}"
