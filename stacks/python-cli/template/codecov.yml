codecov:
  require_ci_to_pass: true
  max_report_age: 24h
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 70%
    changes:
      default:
        enabled: true
