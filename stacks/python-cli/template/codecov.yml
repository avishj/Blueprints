codecov:
  require_ci_to_pass: true
  max_report_age: 24h
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 70%
    changes:
      default:
        enabled: true

flags:
  unit:
    paths:
      - src/myapp/
    carryforward: false
    statuses:
      - type: project
        target: auto
      - type: patch
        target: 70%
  integration:
    paths:
      - src/myapp/
    carryforward: false
    statuses:
      - type: project
        target: auto
      - type: patch
        target: 70%
  e2e:
    paths:
      - src/myapp/
    carryforward: false
    statuses:
      - type: project
        target: auto
      - type: patch
        target: 70%

comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: false

github_checks:
  annotations: true
