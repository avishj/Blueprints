repository:
  name: myapp
  description: A CLI application. Change This
  homepage: https://avishj.github.io/myapp
  topics: python, cli, cyclopts, change-this

  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true

  default_branch: main

  allow_squash_merge: false
  allow_merge_commit: true
  allow_rebase_merge: false
  allow_auto_merge: false
  delete_branch_on_merge: false

  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

labels:
  - name: bug
    color: "d73a4a"
    description: "Something isn't working"
  - name: feature
    color: "0075ca"
    description: "New functionality or enhancement"
  - name: documentation
    color: "0e8a16"
    description: "Documentation improvements"
  - name: ci
    color: "6f42c1"
    description: "CI/CD pipeline changes"
  - name: refactor
    color: "e4e669"
    description: "Code restructure without behavior change"
  - name: dependencies
    color: "0366d6"
    description: "Dependency updates"
  - name: security
    color: "b60205"
    description: "Security vulnerability or improvement"
  - name: tooling
    color: "c5def5"
    description: "Developer tooling and config changes"

branches:
  - name: main
    protection:
      required_pull_request_reviews: null

      required_status_checks:
        strict: true
        contexts:
          - "CI Passed"

      enforce_admins: true
      required_linear_history: false
      restrictions: null
