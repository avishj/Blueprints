---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}
      config: ${{ steps.filter.outputs.config }}
      changed_config_files: ${{ steps.filter.outputs.config_files }}
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          setup-python: "false"
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          list-files: json
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'sonar-project.properties'
              - 'codecov.yml'
              - '.pre-commit-config.yaml'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - '**/*.md'
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
            workflows:
              - '.github/workflows/**'
            config:
              - '**/*.yml'
              - '**/*.yaml'
              - '**/*.json'
              - '**/*.toml'
              - 'sonar-project.properties'
              - '.editorconfig'
              - '.dockerignore'
              - '.gitattributes'
              - '.gitignore'
              - 'justfile'
              - 'Dockerfile'
              - 'CODEOWNERS'
              - 'LICENSE'
              - 'LICENSES/**'

  lint:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main

      - name: Verify lockfile is current
        run: uv lock --check

      - name: Ruff check
        run: uv run ruff check --output-format=github --show-fixes --statistics .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check src/ tests/

      - name: Validate pyproject.toml
        run: uvx validate-pyproject pyproject.toml

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: YAML lint
        run: >-
          uvx yamllint -d '{extends: default, rules: {line-length: disable, truthy: disable}}' .

      - name: EditorConfig check
        run: uvx --from editorconfig-checker ec

      - name: Spell check
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d  # v1.44.0

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          fail: true
          jobSummary: true

      - name: REUSE lint
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5  # v6.0.0
        with:
          args: --include-submodules lint

  actionlint:
    name: Lint Workflows
    if: needs.changes.outputs.workflows == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          setup-python: "false"

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          matcher: true
          shellcheck: true
          pyflakes: true
          flags: "-color"

  docker:
    name: Docker Lint, Build & Validate
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.workflows == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          setup-python: "false"

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Build image
        run: docker build -t myapp:ci .

      - name: Verify entry point
        run: docker run --rm myapp:ci --help

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.workflows == 'true'
    needs: [changes]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set matrix prefix
        id: prefix
        shell: bash
        run: echo "value=${{ matrix.os }}-py${{ matrix.python-version }}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: uv run pytest -m unit --cov --cov-report=xml:coverage-${{ steps.prefix.outputs.value }}-unit.xml --cov-report=term --junitxml=results-${{ steps.prefix.outputs.value }}-unit.xml -n auto
        env:
          COVERAGE_FILE: .coverage.${{ steps.prefix.outputs.value }}.unit

      - name: Run integration tests
        run: uv run pytest -m integration --cov --cov-report=xml:coverage-${{ steps.prefix.outputs.value }}-integration.xml --cov-report=term --junitxml=results-${{ steps.prefix.outputs.value }}-integration.xml -n auto
        env:
          COVERAGE_FILE: .coverage.${{ steps.prefix.outputs.value }}.integration

      - name: Run e2e tests
        run: uv run pytest -m e2e --cov --cov-report=xml:coverage-${{ steps.prefix.outputs.value }}-e2e.xml --cov-report=term --junitxml=results-${{ steps.prefix.outputs.value }}-e2e.xml -n auto
        env:
          COVERAGE_FILE: .coverage.${{ steps.prefix.outputs.value }}.e2e

      - name: Check combined coverage
        run: |
          uv run coverage combine
          uv run coverage report --fail-under=70

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: results-*.xml
          retention-days: 90

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-reports-${{ matrix.os }}-${{ matrix.python-version }}
          path: coverage-*.xml
          retention-days: 90

      - name: Upload unit coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          files: coverage-${{ steps.prefix.outputs.value }}-unit.xml
          flags: unit
          fail_ci_if_error: true
          disable_search: true

      - name: Upload integration coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          files: coverage-${{ steps.prefix.outputs.value }}-integration.xml
          flags: integration
          fail_ci_if_error: true
          disable_search: true

      - name: Upload e2e coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          files: coverage-${{ steps.prefix.outputs.value }}-e2e.xml
          flags: e2e
          fail_ci_if_error: true
          disable_search: true

  sonarcloud:
    name: SonarCloud
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    permissions:
      pull-requests: read
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          setup-python: "false"
          fetch-depth: 0

      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: coverage-reports-*
          merge-multiple: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9  # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  package:
    name: Package Validation
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflows == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main

      - name: Build package
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Verify entry point
        run: uv run --with dist/*.whl --no-project -- myapp --help

  complexity:
    name: Cognitive Complexity
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.workflows == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main

      - name: Run complexipy
        run: uv run complexipy src/ --max-complexity 15 --output-format sarif --output complexipy.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8  # v4.33.0
        with:
          sarif_file: complexipy.sarif
          category: complexipy

  security:
    name: Security Scans
    uses: ./.github/workflows/_security.yml
    permissions:
      security-events: write
    secrets: inherit

  codeql:
    name: CodeQL
    uses: ./.github/workflows/_codeql.yml
    permissions:
      security-events: write

  osv-scanner:
    name: OSV-Scanner
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_osv-scanner.yml
    with:
      scan-mode: ci
    permissions:
      security-events: write

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          setup-python: "false"

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          license-check: true
          vulnerability-check: true
          deny-licenses: SSPL-1.0, BUSL-1.1

  config-validation:
    name: Config Validation
    if: needs.changes.outputs.config == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    env:
      SCHEMA_MAP: |
        [
          { "files": ".github/workflows/*.yml", "validate": "uvx check-jsonschema --builtin-schema vendor.github-workflows" },
          { "files": ".github/ISSUE_TEMPLATE/bug_report.yml .github/ISSUE_TEMPLATE/feature_request.yml", "validate": "uvx check-jsonschema --builtin-schema vendor.github-issue-forms" },
          { "files": "renovate.json", "validate": "uvx check-jsonschema --builtin-schema vendor.renovate" },
          { "files": "codecov.yml", "validate": "uvx check-jsonschema --builtin-schema vendor.codecov" },
          { "files": ".pre-commit-config.yaml", "validate": "uvx check-jsonschema --schemafile https://www.schemastore.org/pre-commit-config.json" },
          { "files": ".github/FUNDING.yml", "validate": "uvx check-jsonschema --schemafile https://www.schemastore.org/github-funding.json" },
          { "files": ".github/labeler.yml", "validate": "uvx check-jsonschema --schemafile https://www.schemastore.org/pull-request-labeler.json" },
          { "files": "pyproject.toml", "validate": "uvx check-jsonschema --schemafile https://www.schemastore.org/pyproject.json" },
          { "files": "mkdocs.yml", "validate": "uvx check-jsonschema --schemafile https://www.schemastore.org/mkdocs-1.6.json" },
          { "files": "REUSE.toml", "validate": "uvx check-jsonschema --schemafile https://reuse.software/reuse-toml-v1.schema.json" }
        ]
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main

      - name: Validate schemas
        shell: bash
        run: |
          jq -r '.[] | select(.validate) | [.files, .validate] | @tsv' <<< "$SCHEMA_MAP" |
            while IFS=$'\t' read -r files cmd; do
              echo "::group::✓ $files"
              $cmd $files
              echo "::endgroup::"
            done

      - name: Warn about unvalidated config files
        if: needs.changes.outputs.config == 'true'
        shell: bash
        env:
          CHANGED_CONFIG_FILES: ${{ needs.changes.outputs.changed_config_files }}
        run: |
          known=$(jq -r '.[].files' <<< "$SCHEMA_MAP" | tr ' ' '\n' | while read -r p; do compgen -G "$p"; done | sort -u)
          changed=$(jq -r '.[]' <<< "$CHANGED_CONFIG_FILES" | sort -u)
          unvalidated=$(grep -vFxf <(echo "$known") <(echo "$changed") || true)
          [[ -n "$unvalidated" ]] && echo "::warning::Changed config files without schema validation, manual review recommended: $(echo "$unvalidated" | tr '\n' ' ')"

  markdownlint:
    name: Lint Markdown
    if: needs.changes.outputs.docs == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Setup
        uses: avishj/blueprints/stacks/python-cli/actions/setup@main
        with:
          setup-python: "false"

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101  # v22.0.0
        with:
          globs: "**/*.md"

  ci-passed:
    name: CI Passed
    if: always()
    needs: [changes, lint, actionlint, docker, test, complexity, security, codeql, osv-scanner, config-validation, markdownlint, dependency-review, sonarcloud, package]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more jobs failed or were cancelled."
            exit 1
          fi
