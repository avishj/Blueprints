name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  check:
    name: Check Published State
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      pypi: ${{ steps.check.outputs.pypi }}
      ghcr: ${{ steps.check.outputs.ghcr }}
      dockerhub: ${{ steps.check.outputs.dockerhub }}
      release: ${{ steps.check.outputs.release }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Check all targets
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          V="${VERSION#v}"
          exists() { "$@" > /dev/null 2>&1 && echo true || echo false; }

          echo "pypi=$(exists curl -sf "https://pypi.org/pypi/myapp/$V/json")" >> "$GITHUB_OUTPUT"
          echo "ghcr=$(exists docker manifest inspect "ghcr.io/${{ github.repository }}:$V")" >> "$GITHUB_OUTPUT"
          echo "dockerhub=$(exists curl -sf "https://hub.docker.com/v2/repositories/${{ github.repository }}/tags/$V")" >> "$GITHUB_OUTPUT"
          echo "release=$(exists gh release view "$VERSION" --repo "${{ github.repository }}")" >> "$GITHUB_OUTPUT"

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is on main
        run: |
          if ! git branch -r --contains "$GITHUB_SHA" | grep -qE 'origin/main$'; then
            echo "::error::Tag must point to a commit on the main branch."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.13"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: uv build

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*

      - name: Upload dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/
          retention-days: 90
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [build, check]
    if: needs.check.outputs.pypi != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/myapp
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@106e0b0b7c337fa67ed433972f777c6357f78598 # v1.13.0
        with:
          print-hash: true
          attestations: true

  sbom:
    name: Generate SBOM
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          path: dist/
          artifact-name: sbom-spdx.json
          output-file: sbom-spdx.json
          format: spdx-json

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "dist/*"
          sbom-path: sbom-spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom-spdx.json
          retention-days: 90

  docker:
    name: Docker (${{ matrix.registry }})
    needs: [build, check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - registry: ghcr.io
            image: ghcr.io/${{ github.repository }}
            username: ${{ github.actor }}
            password_secret: GITHUB_TOKEN
            check_key: ghcr
          - registry: docker.io
            image: docker.io/${{ github.repository }}
            username: DOCKERHUB_USERNAME
            password_secret: DOCKERHUB_TOKEN
            check_key: dockerhub
    steps:
      - name: Check if already published
        id: skip
        if: needs.check.outputs[matrix.check_key] == 'true'
        run: echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Harden runner
        if: '!steps.skip.outputs.published'
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        if: '!steps.skip.outputs.published'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        if: '!steps.skip.outputs.published'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to ${{ matrix.registry }}
        if: '!steps.skip.outputs.published'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ matrix.registry }}
          username: ${{ matrix.registry == 'ghcr.io' && github.actor || secrets[matrix.username] }}
          password: ${{ secrets[matrix.password_secret] }}

      - name: Extract metadata
        if: '!steps.skip.outputs.published'
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        if: '!steps.skip.outputs.published'
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        if: '!steps.skip.outputs.published'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        if: '!steps.skip.outputs.published'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign image
        if: '!steps.skip.outputs.published'
        run: |
          cosign sign --yes --recursive \
            -a repo=${{ github.repository }} \
            -a workflow=${{ github.workflow }} \
            -a ref=${{ github.ref }} \
            "${{ matrix.image }}@${{ steps.push.outputs.digest }}"

      - name: Verify published image
        if: '!steps.skip.outputs.published'
        run: docker run --rm ${{ matrix.image }}@${{ steps.push.outputs.digest }} --help

  trivy:
    name: Trivy Image Scan
    needs: [build, docker]
    uses: ./.github/workflows/_trivy-image.yml
    with:
      image-ref: ghcr.io/${{ github.repository }}:${{ needs.build.outputs.version }}
    permissions:
      security-events: write

  github-release:
    name: GitHub Release
    needs: [build, publish-pypi, sbom, docker, check]
    if: >-
      needs.check.outputs.release != 'true'
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom/

      - name: Collect image digests
        id: digests
        run: |
          V="${{ needs.build.outputs.version }}"
          GHCR=$(docker manifest inspect "ghcr.io/${{ github.repository }}:$V" -q 2>/dev/null || echo "n/a")
          DH=$(curl -sf "https://hub.docker.com/v2/repositories/${{ github.repository }}/tags/$V" | jq -r '.digest // "n/a"' 2>/dev/null || echo "n/a")
          { echo "ghcr=$GHCR"; echo "dockerhub=$DH"; } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" --jq '.body')

          NOTES="${NOTES}

          ## Docker Images
          - \`ghcr.io/${{ github.repository }}@${{ steps.digests.outputs.ghcr }}\`
          - \`docker.io/${{ github.repository }}@${{ steps.digests.outputs.dockerhub }}\`"

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --verify-tag \
            --notes "$NOTES" \
            dist/* sbom/*
